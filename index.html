<!DOCTYPE html>
<html>
<head>
    <title>AI Crop Recommendation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <h2 class="text-center mb-4">AI Crop Recommendation System</h2>
    <form action="/predict" method="post" class="bg-white p-4 rounded shadow">
        <div class="row">
            {% for field in ['N','P','K','temperature','humidity','ph','rainfall'] %}
            <div class="col-md-4 mb-3">
                <label class="form-label">{{field}}</label>
                <input type="number" step="any" class="form-control" name="{{field}}" required>
            </div>
            {% endfor %}
        </div>
        <button type="submit" class="btn btn-primary">Predict Crop</button>
    </form>
</div>
</body>
</html>
