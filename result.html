<!DOCTYPE html>
<html>
<head>
    <title>AI Crop Recommendation Result</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <h2 class="text-center mb-4">AI Crop Recommendation Result</h2>
    <div class="bg-white p-4 rounded shadow">
        <h4>Recommended Crop: {{crop}}</h4>
        <h5 class="mt-3">Your Input Values:</h5>
        <ul>
            {% for key, value in explanation.items() %}
                {% if key != 'Reason' %}
                <li>{{key}}: {{value}}</li>
                {% endif %}
            {% endfor %}
        </ul>
        <p>{{explanation['Reason']}}</p>

        <h5>Model Graphs:</h5>
        <img src="{{accuracy_graph}}" alt="Accuracy Graph" class="img-fluid mb-3">
        <img src="{{feature_graph}}" alt="Feature Importance" class="img-fluid mb-3">

        <a href="/" class="btn btn-secondary mt-3">Try Again</a>
    </div>
</div>
</body>
</html>
